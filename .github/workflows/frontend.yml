name: CI/CD Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/vkychatappfrontend:latest
          build-args: |
            VITE_BASE_URL_WEBSOCKET_CHAT=https://vkychatapp.com/ws/chat
            VITE_BASE_URL_WEBSOCKET_CONTACTS=https://vkychatapp.com/ws/contacts
            VITE_BASE_URL_USER=https://vkychatapp.com/api/user
            VITE_BASE_URL=https://vkychatapp.com/api/v1
            VITE_USER_SERVICE_URL=/user
            VITE_AUTH_SERVICE_URL=/auth
            VITE_CHAT_SERVICE_URL=/chat
            VITE_CONTACTS_SERVICE_URL=/contacts
            VITE_INVITATION_SERVICE_URL=/invitation
            VITE_MAIL_SERVICE_URL=/mail

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -i ~/.ssh/id_rsa root@${{ secrets.VPS_HOST }} "echo SSH connected"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/vkychatappfrontend:latest
            docker stop vkychatapp-frontend || true
            docker rm vkychatapp-frontend || true
            docker run -d -p 8080:80 -p 443:443 \
              -v /etc/letsencrypt/docker-certs/vkychatapp.com:/etc/letsencrypt/live/vkychatapp.com:ro \
              --name vkychatapp-frontend \
              ${{ secrets.DOCKER_HUB_USERNAME }}/vkychatappfrontend:latest
